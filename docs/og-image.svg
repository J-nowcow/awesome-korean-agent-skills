<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.05" stroke="#58a6ff" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="630" x2="1200" y2="0"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
  </g>

  <!-- Left side: Mascot (simplified) -->
  <g transform="translate(180, 160) scale(0.8)">
    <!-- Body -->
    <rect x="120" y="80" width="160" height="190" rx="40" fill="url(#accent)" opacity="0.9"/>
    <!-- Screen -->
    <rect x="140" y="100" width="120" height="90" rx="15" fill="#1a1b26"/>
    <!-- Eyes -->
    <ellipse cx="172" cy="140" rx="12" ry="14" fill="#58a6ff"/>
    <ellipse cx="228" cy="140" rx="12" ry="14" fill="#bc8cff"/>
    <circle cx="176" cy="134" r="4" fill="#fff" opacity="0.8"/>
    <circle cx="232" cy="134" r="4" fill="#fff" opacity="0.8"/>
    <!-- Smile -->
    <path d="M 175 160 Q 200 178 225 160" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
    <!-- Taegeuk -->
    <g transform="translate(200, 220)">
      <path d="M 0,-18 A 18,18 0 0,1 0,18 A 9,9 0 0,0 0,0 A 9,9 0 0,1 0,-18" fill="#c73e3a"/>
      <path d="M 0,18 A 18,18 0 0,1 0,-18 A 9,9 0 0,0 0,0 A 9,9 0 0,1 0,18" fill="#2e5faa"/>
    </g>
    <!-- Antenna -->
    <line x1="200" y1="75" x2="200" y2="55" stroke="#8b949e" stroke-width="3"/>
    <circle cx="200" cy="48" r="8" fill="#ff6b6b"/>
    <!-- Legs -->
    <rect x="150" y="265" width="28" height="30" rx="10" fill="url(#accent)" opacity="0.9"/>
    <rect x="222" y="265" width="28" height="30" rx="10" fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- Right side: Text -->
  <g transform="translate(520, 0)">
    <!-- Korean flag -->
    <text x="0" y="180" font-size="48">🇰🇷</text>

    <!-- Title -->
    <text x="0" y="250" font-size="52" font-weight="800" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif">Awesome Korean</text>
    <text x="0" y="310" font-size="52" font-weight="800" fill="url(#accent)" font-family="system-ui, -apple-system, sans-serif">Agent Skills</text>

    <!-- Subtitle -->
    <text x="0" y="370" font-size="22" fill="#8b949e" font-family="system-ui, sans-serif">한국어 AI 코딩 에이전트 스킬 400+ 큐레이션</text>

    <!-- Stats -->
    <g transform="translate(0, 410)">
      <rect x="0" y="0" width="120" height="50" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="60" y="22" text-anchor="middle" font-size="18" font-weight="700" fill="#58a6ff" font-family="system-ui">400+</text>
      <text x="60" y="40" text-anchor="middle" font-size="11" fill="#8b949e" font-family="system-ui">Skills</text>

      <rect x="135" y="0" width="120" height="50" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="195" y="22" text-anchor="middle" font-size="18" font-weight="700" fill="#bc8cff" font-family="system-ui">26</text>
      <text x="195" y="40" text-anchor="middle" font-size="11" fill="#8b949e" font-family="system-ui">Categories</text>

      <rect x="270" y="0" width="120" height="50" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="330" y="22" text-anchor="middle" font-size="18" font-weight="700" fill="#4ade80" font-family="system-ui">7+</text>
      <text x="330" y="40" text-anchor="middle" font-size="11" fill="#8b949e" font-family="system-ui">Tools</text>
    </g>

    <!-- AI maintained badge -->
    <g transform="translate(0, 490)">
      <rect x="0" y="0" width="280" height="32" rx="16" fill="#238636" opacity="0.9"/>
      <text x="140" y="21" text-anchor="middle" font-size="13" font-weight="600" fill="#fff" font-family="system-ui">🤖 100% AI Agent-Maintained</text>
    </g>
  </g>

  <!-- Tool icons at bottom -->
  <g transform="translate(520, 560)">
    <text x="0" y="0" font-size="13" fill="#484f58" font-family="system-ui">Claude Code · Gemini CLI · Codex · Cursor · Windsurf · Copilot · OpenCode</text>
  </g>
</svg>
