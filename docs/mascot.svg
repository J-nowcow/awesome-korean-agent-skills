<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8ff"/>
      <stop offset="100%" style="stop-color:#c4a0ff"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89c4ff"/>
      <stop offset="100%" style="stop-color:#b8a0ff"/>
    </linearGradient>
    <linearGradient id="earGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6eb0ff"/>
      <stop offset="100%" style="stop-color:#89c4ff"/>
    </linearGradient>
    <linearGradient id="earGradR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8a0ff"/>
      <stop offset="100%" style="stop-color:#d4b8ff"/>
    </linearGradient>
    <radialGradient id="blushL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff9eb8; stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ff9eb8; stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blushR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff9eb8; stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ff9eb8; stop-opacity:0"/>
    </radialGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#8b7fcc" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Floating wobble animation for whole character -->
  <g transform="translate(0, 0)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="3s" repeatCount="indefinite"/>

    <!-- ═══ ANTENNA ═══ -->
    <line x1="200" y1="42" x2="200" y2="18" stroke="#c4a0ff" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Antenna ball (pulsing) -->
    <circle cx="200" cy="14" r="9" fill="#ffd666" filter="url(#glow)">
      <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Antenna sparkle -->
    <text x="212" y="12" font-size="10" opacity="0.8">✦
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </text>

    <!-- ═══ EARS ═══ -->
    <!-- Left ear -->
    <rect x="72" y="108" width="30" height="52" rx="12" fill="url(#earGradL)" filter="url(#softShadow)"/>
    <rect x="78" y="118" width="18" height="12" rx="4" fill="#a8d8ff" opacity="0.6"/>
    <!-- Right ear -->
    <rect x="298" y="108" width="30" height="52" rx="12" fill="url(#earGradR)" filter="url(#softShadow)"/>
    <rect x="304" y="118" width="18" height="12" rx="4" fill="#d8c8ff" opacity="0.6"/>

    <!-- ═══ HEAD (big! kawaii proportions) ═══ -->
    <ellipse cx="200" cy="148" rx="108" ry="110" fill="url(#headGrad)" filter="url(#softShadow)"/>

    <!-- Forehead shine -->
    <ellipse cx="170" cy="85" rx="40" ry="18" fill="#fff" opacity="0.12" transform="rotate(-15,170,85)"/>

    <!-- ═══ FACE ═══ -->

    <!-- Eyes - big, sparkly, kawaii style -->
    <!-- Left eye -->
    <ellipse cx="160" cy="148" rx="22" ry="26" fill="#2a2a3d"/>
    <ellipse cx="160" cy="148" rx="19" ry="23" fill="#3a3a5d"/>
    <!-- Iris -->
    <ellipse cx="163" cy="150" rx="14" ry="17" fill="#58a6ff"/>
    <ellipse cx="163" cy="154" rx="10" ry="12" fill="#3d8bfd"/>
    <!-- Pupil -->
    <ellipse cx="164" cy="152" rx="6" ry="7" fill="#1a1a2e"/>
    <!-- Big sparkle -->
    <circle cx="170" cy="140" r="6" fill="#fff" opacity="0.95"/>
    <!-- Small sparkle -->
    <circle cx="155" cy="156" r="3" fill="#fff" opacity="0.7"/>
    <!-- Eyelid blink -->
    <ellipse cx="160" cy="148" rx="22" ry="26" fill="url(#headGrad)">
      <animate attributeName="ry" values="0;0;0;26;0;0;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.42;0.44;0.48;0.52;0.54;1"/>
    </ellipse>

    <!-- Right eye -->
    <ellipse cx="240" cy="148" rx="22" ry="26" fill="#2a2a3d"/>
    <ellipse cx="240" cy="148" rx="19" ry="23" fill="#3a3a5d"/>
    <ellipse cx="243" cy="150" rx="14" ry="17" fill="#bc8cff"/>
    <ellipse cx="243" cy="154" rx="10" ry="12" fill="#a370e8"/>
    <ellipse cx="244" cy="152" rx="6" ry="7" fill="#1a1a2e"/>
    <circle cx="250" cy="140" r="6" fill="#fff" opacity="0.95"/>
    <circle cx="235" cy="156" r="3" fill="#fff" opacity="0.7"/>
    <ellipse cx="240" cy="148" rx="22" ry="26" fill="url(#headGrad)">
      <animate attributeName="ry" values="0;0;0;26;0;0;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.42;0.44;0.48;0.52;0.54;1"/>
    </ellipse>

    <!-- Blush cheeks -->
    <ellipse cx="128" cy="175" rx="18" ry="12" fill="url(#blushL)"/>
    <ellipse cx="272" cy="175" rx="18" ry="12" fill="url(#blushR)"/>

    <!-- Mouth - cat smile :3 -->
    <path d="M 182 190 Q 192 200 200 194 Q 208 200 218 190" fill="none" stroke="#e879a0" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Nose dot -->
    <circle cx="200" cy="182" r="2.5" fill="#d4a0c0" opacity="0.6"/>

    <!-- ═══ TAEGEUK (on forehead, like a gem) ═══ -->
    <g transform="translate(200, 98) scale(0.55)">
      <circle cx="0" cy="0" r="18" fill="#fff" opacity="0.3"/>
      <path d="M 0,-15 A 15,15 0 0,1 0,15 A 7.5,7.5 0 0,0 0,0 A 7.5,7.5 0 0,1 0,-15" fill="#c73e3a" opacity="0.85"/>
      <path d="M 0,15 A 15,15 0 0,1 0,-15 A 7.5,7.5 0 0,0 0,0 A 7.5,7.5 0 0,1 0,15" fill="#2e5faa" opacity="0.85"/>
    </g>

    <!-- ═══ BODY (small, cute) ═══ -->
    <rect x="155" y="248" width="90" height="80" rx="30" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

    <!-- Belly screen -->
    <rect x="172" y="262" width="56" height="36" rx="10" fill="#1e2030" opacity="0.7"/>
    <!-- Code lines on belly -->
    <rect x="180" y="270" width="24" height="3" rx="1.5" fill="#58a6ff" opacity="0.7"/>
    <rect x="180" y="277" width="36" height="3" rx="1.5" fill="#bc8cff" opacity="0.5"/>
    <rect x="180" y="284" width="18" height="3" rx="1.5" fill="#4ade80" opacity="0.6"/>

    <!-- ═══ ARMS ═══ -->
    <!-- Left arm -->
    <g>
      <ellipse cx="138" cy="282" rx="18" ry="16" fill="url(#bodyGrad)"/>
      <!-- Waving hand -->
      <g transform="translate(118, 268)">
        <animateTransform attributeName="transform" type="rotate" values="-5,138,282;10,138,282;-5,138,282" dur="2s" repeatCount="indefinite"/>
        <!-- Tiny hand with SKILL.md card -->
        <rect x="-25" y="-8" width="28" height="38" rx="5" fill="#fff" stroke="#e0e0e0" stroke-width="1.5" opacity="0.95" transform="rotate(-10)"/>
        <text x="-20" y="8" font-size="7" font-weight="bold" fill="#58a6ff" font-family="monospace" transform="rotate(-10)">SKILL</text>
        <text x="-17" y="18" font-size="6" fill="#8b949e" font-family="monospace" transform="rotate(-10)">.md</text>
      </g>
    </g>

    <!-- Right arm -->
    <g>
      <ellipse cx="262" cy="282" rx="18" ry="16" fill="url(#bodyGrad)"/>
      <!-- Magnifying glass -->
      <g transform="translate(278, 272)">
        <circle cx="12" cy="0" r="11" fill="none" stroke="#ffd666" stroke-width="3"/>
        <circle cx="12" cy="0" r="7" fill="#ffeaa0" opacity="0.15"/>
        <line x1="4" y1="8" x2="-4" y2="16" stroke="#ffd666" stroke-width="3" stroke-linecap="round"/>
        <text x="8" y="4" font-size="9" fill="#ffd666" opacity="0.8">✧</text>
      </g>
    </g>

    <!-- ═══ LEGS ═══ -->
    <!-- Left leg -->
    <ellipse cx="178" cy="332" rx="16" ry="20" fill="url(#bodyGrad)"/>
    <ellipse cx="175" cy="350" rx="20" ry="10" fill="#7eb8ff" opacity="0.7"/>
    <!-- Right leg -->
    <ellipse cx="222" cy="332" rx="16" ry="20" fill="url(#bodyGrad)"/>
    <ellipse cx="225" cy="350" rx="20" ry="10" fill="#c4a0ff" opacity="0.7"/>

  </g>

  <!-- ═══ FLOATING DECORATIONS ═══ -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2.5s" repeatCount="indefinite"/>
    <!-- Stars and sparkles -->
    <text x="60" y="80" font-size="16" opacity="0.5">✦</text>
    <text x="330" y="70" font-size="14" opacity="0.4">✧</text>
    <text x="45" y="220" font-size="12" opacity="0.3">⭐</text>
    <text x="348" y="200" font-size="11" opacity="0.35">💫</text>
    <text x="70" y="330" font-size="10" opacity="0.3">✦</text>
    <text x="325" y="340" font-size="13" opacity="0.4">✧</text>
  </g>

  <!-- Skill type icons floating -->
  <g opacity="0.55">
    <text x="56" y="150" font-size="18">🔧
      <animateTransform attributeName="transform" type="translate" values="0,0;3,-5;0,0" dur="3.5s" repeatCount="indefinite"/>
    </text>
    <text x="332" y="140" font-size="16">🤖
      <animateTransform attributeName="transform" type="translate" values="0,0;-3,-4;0,0" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- KO badge -->
  <g transform="translate(298, 58)">
    <rect x="0" y="0" width="38" height="24" rx="12" fill="#238636" opacity="0.9"/>
    <text x="19" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff" font-family="system-ui">KO</text>
  </g>
</svg>
