<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#24283b"/>
    </linearGradient>
    <linearGradient id="antennaGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#0d1117" opacity="0.6"/>

  <!-- Antenna -->
  <line x1="200" y1="75" x2="200" y2="55" stroke="#8b949e" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="48" r="8" fill="url(#antennaGlow)" filter="url(#glow)">
    <animate attributeName="r" values="7;9;7" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Body -->
  <rect x="120" y="80" width="160" height="190" rx="40" fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Screen/Face -->
  <rect x="140" y="100" width="120" height="90" rx="15" fill="url(#screenGrad)"/>

  <!-- Eyes -->
  <g>
    <!-- Left eye -->
    <ellipse cx="172" cy="140" rx="12" ry="14" fill="#58a6ff">
      <animate attributeName="ry" values="14;2;14" dur="4s" begin="0s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Right eye -->
    <ellipse cx="228" cy="140" rx="12" ry="14" fill="#bc8cff">
      <animate attributeName="ry" values="14;2;14" dur="4s" begin="0s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Eye sparkles -->
    <circle cx="176" cy="134" r="4" fill="#fff" opacity="0.8"/>
    <circle cx="232" cy="134" r="4" fill="#fff" opacity="0.8"/>
  </g>

  <!-- Smile -->
  <path d="M 175 160 Q 200 178 225 160" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>

  <!-- Korean flag element (taegeuk on chest) -->
  <g transform="translate(200, 220)">
    <!-- Simplified taegeuk -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#30363d" stroke-width="1"/>
    <path d="M 0,-18 A 18,18 0 0,1 0,18 A 9,9 0 0,0 0,0 A 9,9 0 0,1 0,-18" fill="#c73e3a"/>
    <path d="M 0,18 A 18,18 0 0,1 0,-18 A 9,9 0 0,0 0,0 A 9,9 0 0,1 0,18" fill="#2e5faa"/>
  </g>

  <!-- Arms -->
  <!-- Left arm holding magnifying glass -->
  <g transform="translate(105, 180)">
    <rect x="-5" y="-8" width="25" height="16" rx="8" fill="url(#bodyGrad)"/>
    <!-- Magnifying glass -->
    <circle cx="-18" cy="0" r="14" fill="none" stroke="#8b949e" stroke-width="3"/>
    <circle cx="-18" cy="0" r="10" fill="#161b22" opacity="0.8"/>
    <line x1="-8" y1="10" x2="2" y2="18" stroke="#8b949e" stroke-width="3" stroke-linecap="round"/>
    <!-- Sparkle in glass -->
    <text x="-22" y="4" font-size="12" fill="#58a6ff">✦</text>
  </g>

  <!-- Right arm with skill card -->
  <g transform="translate(280, 170)">
    <rect x="-5" y="-8" width="25" height="16" rx="8" fill="url(#bodyGrad)"/>
    <!-- Skill card -->
    <rect x="15" y="-20" width="35" height="45" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1.5">
      <animate attributeName="y" values="-20;-24;-20" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="22" y="-4" font-size="8" fill="#58a6ff" font-family="monospace">SKILL</text>
    <text x="24" y="8" font-size="7" fill="#8b949e" font-family="monospace">.md</text>
    <rect x="20" y="14" width="25" height="2" rx="1" fill="#30363d"/>
  </g>

  <!-- Legs -->
  <rect x="150" y="265" width="28" height="30" rx="10" fill="url(#bodyGrad)"/>
  <rect x="222" y="265" width="28" height="30" rx="10" fill="url(#bodyGrad)"/>
  <!-- Feet -->
  <ellipse cx="164" cy="298" rx="20" ry="8" fill="#4a5568"/>
  <ellipse cx="236" cy="298" rx="20" ry="8" fill="#4a5568"/>

  <!-- Floating skill icons around -->
  <g opacity="0.6">
    <text x="70" y="120" font-size="20">🔧</text>
    <text x="310" y="110" font-size="18">🤖</text>
    <text x="55" y="260" font-size="16">⚡</text>
    <text x="325" y="270" font-size="16">🪝</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- "KO" badge -->
  <g transform="translate(290, 90)">
    <rect x="0" y="0" width="36" height="22" rx="11" fill="#238636"/>
    <text x="18" y="15" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff" font-family="system-ui">KO</text>
  </g>
</svg>
