name: Link Checker

on:
  schedule:
    - cron: '0 5 * * *'   # daily 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run link checker
        run: bash .github/scripts/check-links.sh

      - name: Sync README counts + stats + trends
        run: |
          # 죽은 링크 제거되면 카테고리 카운트도 바뀌니 README도 같이 갱신
          bash .github/scripts/sync-counts.sh
          bash .github/scripts/generate-stats.sh
          bash .github/scripts/generate-trends.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch, commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          BRANCH="auto/link-check-${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # run이 도는 동안 main에 다른 commit이 들어오면 stale workflow가 포함될 수 있어
          # GITHUB_TOKEN이 거부함 → stash + reset to origin/main + pop으로 회피.
          git stash push --include-untracked -m "link-checker work" || true
          git fetch origin main
          git reset --hard origin/main
          git stash pop || true

          # stale 동명 브랜치 정리 (auto/* throwaway)
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add categories/ data/ README.md README.en.md docs/trends.md
          git commit -m "chore: 죽은 링크 제거 + stats 갱신 (${DATE})"
          git push --force-with-lease origin "$BRANCH"

          echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"
          echo "DATE=${DATE}" >> "$GITHUB_ENV"

      - name: Create PR and auto-merge
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEAD_COUNT="$(cat /tmp/dead-link-count 2>/dev/null || echo 0)"
          DEAD_LOG_BODY="$(cat /tmp/dead-links.log 2>/dev/null || echo '(없음)')"

          {
            echo "## 변경 내용"
            echo ""
            echo "자동으로 탐지된 죽은 링크를 제거했습니다."
            echo ""
            echo "**제거된 링크 수:** ${DEAD_COUNT}개"
            echo ""
            echo "### 죽은 링크 목록"
            echo ""
            echo '```'
            echo "${DEAD_LOG_BODY}"
            echo '```'
            echo ""
            echo "---"
            echo "🤖 *link-checker 워크플로우에 의해 자동 생성됨*"
          } > /tmp/pr-body.md

          gh pr create \
            --title "🤖 [auto] 죽은 링크 ${DEAD_COUNT}개 제거 (${DATE})" \
            --body-file /tmp/pr-body.md \
            --label "auto-merge" --label "link-check" \
            --head "$BRANCH" \
            --base main

          # Auto-merge
          gh pr merge --auto --squash "$BRANCH"
