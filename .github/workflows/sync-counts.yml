name: Sync Category Counts

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-counts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run sync-counts script
        run: bash .github/scripts/sync-counts.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch, commit, and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          DATE="$(date +%Y-%m-%d)"
          BRANCH="auto/sync-counts-${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add README.md README.en.md
          git commit -m "chore: 카테고리 카운트 동기화 (${DATE})"
          git push origin "$BRANCH"

          echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"
          echo "DATE=${DATE}" >> "$GITHUB_ENV"

      - name: Create PR with auto-merge
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "🤖 [auto] 카테고리 카운트 동기화 (${DATE})" \
            --body "## 카테고리 카운트 자동 동기화

          각 카테고리 파일의 실제 항목 수를 기준으로 README 테이블을 업데이트합니다.

          - 실행 날짜: \`${DATE}\`
          - 트리거: 정기 스케줄 (daily 06:00 UTC)

          ---
          > 🤖 이 PR은 \`sync-counts\` 워크플로우에 의해 자동 생성되었습니다." \
            --label "auto-merge" \
            --label "sync-counts" \
            --head "$BRANCH" \
            --base main)

          gh pr merge --auto --squash "$PR_URL"
